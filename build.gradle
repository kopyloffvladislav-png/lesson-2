plugins {
    id 'java-library'
}

repositories {
    mavenCentral()
}

dependencies {
testImplementation(
        'org.junit.jupiter:junit-jupiter:6.1.0-M1',
        'com.codeborne:selenide:7.16.0',
        'org.junit.platform:junit-platform-launcher',
        'org.slf4j:slf4j-simple:2.0.17'
)
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

test {
    useJUnitPlatform()
}